<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        body { 
            background: #f0f2f5; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .sidebar { 
            width: 260px; 
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.1); 
        }
        
        .sidebar h2 { 
            font-size: 22px; 
            margin-bottom: 30px; 
            text-align: center; 
        }
        
        .user-info { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
        }
        
        .sidebar a { 
            color: rgba(255,255,255,0.9); 
            text-decoration: none; 
            padding: 12px 15px; 
            margin: 5px 0; 
            border-radius: 8px; 
            transition: all 0.3s; 
            display: block; 
            font-weight: 500; 
        }
        
        .sidebar a:hover { 
            background: rgba(255,255,255,0.2); 
            color: white; 
            padding-left: 20px; 
        }
        
        .logout-btn { 
            margin-top: auto; 
            background: rgba(0,0,0,0.1); 
            text-align: center; 
            cursor: pointer;
        }
        
        .main { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
        }
        
        .info-card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            border-left: 5px solid #667eea; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .form-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
        }
        
        .form-row { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 15px; 
        }
        
        .form-group { 
            flex: 1; 
        }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #555; 
            font-size: 14px; 
        }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px; 
        }
        
        button { 
            padding: 12px 25px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            float: right; 
        }
        
        button:hover { 
            background: #5a6fd6; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        
        th { 
            background: #667eea; 
            color: white; 
            padding: 15px; 
            text-align: left; 
            font-size: 14px; 
            text-transform: uppercase; 
        }
        
        td { 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            font-size: 14px; 
            color: #333; 
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="user-info">
            <h2>Student Panel</h2>
            <!-- Node.js string replacement placeholder -->
            <p>{{FULLNAME}}</p>
        </div>
        <a href="/student_dashboard">Dashboard</a>
        <a href="/profile">My Profile</a>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="main">
        <div class="info-card">
            <div>
                <h3>Assigned Warden</h3>
                <!-- Node.js string replacement placeholders -->
                <p>{{WARDEN_NAME}}</p>
            </div>
            <span>📞 {{WARDEN_PHONE}}</span>
        </div>

        <div class="form-card">
            <h3 style="margin-bottom:20px;">New Out Request</h3>
            
            <!-- This form sends data to our /submit-request route in server.js -->
            <form action="/submit-request" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Request Type</label>
                        <select name="request_type">
                            <option value="Normal">Normal</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Where are you going?</label>
                        <input type="text" name="destination" placeholder="e.g. Home, Market, Hospital" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Out Date</label>
                        <input type="date" name="out_date" id="out_date" required>
                    </div>
                    <div class="form-group">
                        <label>Out Time</label>
                        <input type="time" name="out_time" required>
                    </div>
                    <div class="form-group">
                        <label>Return Date</label>
                        <input type="date" name="in_date" id="in_date" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Reason</label>
                    <textarea name="reason" placeholder="Detailed reason..." required style="height:80px;"></textarea>
                </div>
                
                <button type="submit">Submit Request</button>
                <div style="clear:both"></div>
            </form>
        </div>

        <h3 style="margin-bottom: 15px;">Request History</h3>
        <table>
            <thead>
                <tr>
                    <th>Where To</th>
                    <th>Out</th>
                    <th>Return</th>
                    <th>Teacher</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                
                {{HISTORY_TABLE}}
            </tbody>
        </table>
    </div>
<!-- Add this right above </body> -->
    <script>
        // 1. Get the date input boxes
        const outDateInput = document.getElementById('out_date');
        const inDateInput = document.getElementById('in_date');

        // 2. Calculate today's exact date in the format HTML expects (YYYY-MM-DD)
        const today = new Date().toISOString().split('T')[0];

        // 3. Stop them from picking a date in the past
        outDateInput.min = today;
        inDateInput.min = today;

        // 4. MAGIC: When they pick an Out Date, force the Return Date to be on or after it!
        outDateInput.addEventListener('change', function() {
            inDateInput.min = this.value; 
            
            // If they already picked a return date that is now invalid, clear it
            if (inDateInput.value < this.value) {
                inDateInput.value = '';
            }
        });
    </script>
</body>
</html>
