<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 22px; margin-bottom: 30px; text-align: center; font-weight: 700; }
        .user-info { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sidebar a { color: rgba(255,255,255,0.9); text-decoration: none; padding: 12px 15px; margin: 8px 0; border-radius: 8px; transition: all 0.3s; display: block; font-weight: 500; }
        .sidebar a:hover { background: rgba(255,255,255,0.2); color: white; transform: translateX(5px); }
        .logout-btn { margin-top: auto; background: rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-bottom: 5px solid #ff9966; }
        .stat-card h3 { font-size: 14px; color: #888; text-transform: uppercase; }
        .stat-card b { font-size: 36px; color: #ff9966; display: block; margin-top: 10px; }
        h3.section-title { margin-bottom: 20px; color: #444; font-size: 1.2rem; border-left: 5px solid #ff9966; padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th { background: #ff9966; color: white; padding: 15px; text-align: left; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #333; font-size: 14px; vertical-align: middle; }
        .student-name { font-weight: bold; font-size: 1rem; color: #333; }
        .sub-text { font-size: 0.85rem; color: #777; display: block; margin-top: 2px; }
        .btn { padding: 8px 16px; text-decoration: none; color: white; border-radius: 6px; font-size: 13px; font-weight: bold; margin-right: 8px; cursor: pointer; border: none; }
        .approve { background: #28a745; }
        .reject { background: #dc3545; }
        .empty-state { text-align: center; padding: 50px; background: white; border-radius: 12px; color: #888; }
    </style>
    <!-- Load Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar">
        <div class="user-info">
            <h2>Teacher Panel</h2>
            <p>Class In-Charge:</p>
            <strong id="teacherYear">Loading...</strong>
        </div>
        <a href="teacher_dashboard.html">📊 Dashboard</a>
        <a href="profile.html">👤 My Profile</a>
        <a onclick="logout()" class="logout-btn">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="stats-row">
            <div class="stat-card"><h3>Pending Actions</h3><b id="pendingCount">0</b></div>
        </div>

        <h3 class="section-title">Pending Student Requests</h3>
        <table>
            <thead><tr><th>Student Details</th><th>Destination</th><th>Date & Time</th><th>Reason</th><th>Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;"><p>No pending requests found.</p></div>
    </div>

    <script>
        // SUPABASE CONNECTION
        const supabaseUrl = 'https://rekuelfrjkgeabhbsvqy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJla3VlbGZyamtnZWFiaGJzdnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzY3MzEsImV4cCI6MjA5MDAxMjczMX0.3yxUU9Qls7enZdSceXmLkst0CiMkkt2UuUTH7n63E0o';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentTeacher = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('user_id');
            if(localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('user_role') !== 'teacher' || !userId) {
                window.location.href = 'login.html?role=teacher'; return;
            }

            const { data: teacher } = await supabaseClient.from('teachers').select('*').eq('id', userId).single();
            if(teacher) {
                currentTeacher = teacher;
                document.getElementById('teacherYear').innerText = "Year " + teacher.assigned_year;
                renderDashboard();
            }
        });

        async function renderDashboard() {
           
            const { data: reqs, error } = await supabaseClient
                .from('out_permissions')
                .select(`
                    *,
                    students!inner(fullname, room_number, study_year)
                `)
                .eq('teacher_approval', 'Pending')
                .eq('students.study_year', currentTeacher.assigned_year)
                .order('request_id', { ascending: false });

            if(error) { console.error(error); return; }

            document.getElementById('pendingCount').innerText = reqs ? reqs.length : 0;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(!reqs || reqs.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.querySelector('table').style.display = 'none';
            } else {
                document.getElementById('emptyState').style.display = 'none';
                document.querySelector('table').style.display = 'table';
                
                reqs.forEach(req => {
                    tbody.innerHTML += `<tr>
                        <td><span class="student-name">${req.students.fullname}</span><span class="sub-text">Room: ${req.students.room_number}</span></td>
                        <td><strong>${req.destination}</strong></td>
                        <td>${req.out_date}<span class="sub-text">${req.out_time}</span></td>
                        <td>${req.reason}</td>
                        <td>
                            <button onclick="updateStatus(${req.request_id}, 'Approved')" class="btn approve">Approve</button>
                            <button onclick="updateStatus(${req.request_id}, 'Rejected')" class="btn reject">Reject</button>
                        </td>
                    </tr>`;
                });
            }
        }

        async function updateStatus(id, newStatus) {
           
            const mainStatus = newStatus === 'Rejected' ? 'Rejected By Teacher' : 'Pending Warden';
            
            const { error } = await supabaseClient.from('out_permissions')
                .update({ teacher_approval: newStatus, status: mainStatus })
                .eq('request_id', id);

            if(error) alert("Error: " + error.message);
            else renderDashboard();
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
