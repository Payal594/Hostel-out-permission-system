<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: background 0.5s ease; }
        .reset-card { background: white; padding: 40px; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; transition: color 0.3s; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; }
        button { width: 100%; padding: 14px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .links { margin-top: 20px; font-size: 0.9rem; }
        .links a { color: #555; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        #errorMsg { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; font-size: 0.9rem; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h2 id="pageTitle">Reset Password</h2>
        
        <div id="errorMsg">Account not found. Check your email and phone number.</div>
        
        <form action="/reset-password" method="POST">
            <div class="form-group">
                <label>I am a:</label>
                <select id="roleSelect" name="role" required>
                    <option value="student">Student</option>
                    <option value="warden">Warden</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter registered email" required>
            </div>
            <div class="form-group">
                <label>Phone Number (Verification)</label>
                <input type="tel" name="phone" maxlength="10" pattern="[0-9]{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Enter 10-digit phone number" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newpass" placeholder="Enter new password" required>
            </div>
            <button type="submit" id="resetBtn">Update Password</button>

            <div class="links">
                <a href="index.html">← Back to Home</a>
            </div>
        </form>
    </div>

    <script>
        const roleSelect = document.getElementById('roleSelect');
        const body = document.body;
        const btn = document.getElementById('resetBtn');
        const title = document.getElementById('pageTitle');

        // Check if server sent us an error
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'notfound') {
            document.getElementById('errorMsg').style.display = 'block';
        }

        // Dynamic Styling
        roleSelect.addEventListener('change', function() {
            if (this.value === 'student') {
                body.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
                btn.style.background = "linear-gradient(to right, #667eea, #764ba2)";
                title.style.color = "#667eea";
            } else if (this.value === 'warden') {
                body.style.background = "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)";
                btn.style.background = "linear-gradient(to right, #11998e, #38ef7d)";
                title.style.color = "#11998e";
            } else if (this.value === 'teacher') {
                body.style.background = "linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)";
                btn.style.background = "linear-gradient(to right, #ff9966, #ff5e62)";
                title.style.color = "#ff9966";
            }
        });
    </script>
</body>
</html>
