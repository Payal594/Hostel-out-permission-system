<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: background 0.5s ease; }
        .reset-card { background: white; padding: 40px; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; transition: color 0.3s; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; }
        button { width: 100%; padding: 14px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .links { margin-top: 20px; font-size: 0.9rem; }
        .links a { color: #555; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
    <!-- Load Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="reset-card">
        <h2 id="pageTitle">Reset Password</h2>
        
        <form id="resetForm">
            <div class="form-group">
                <label>I am a:</label>
                <select id="roleSelect" required>
                    <option value="student">Student</option>
                    <option value="warden">Warden</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter registered email" required>
            </div>
            <div class="form-group">
                <label>Phone Number (Verification)</label>
                <input type="tel" id="phone" maxlength="10" pattern="[0-9]{10}" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Enter 10-digit phone number" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newpass" placeholder="Enter new password" required>
            </div>
            <button type="submit" id="resetBtn">Update Password</button>

            <div class="links">
                <a href="index.html">← Back to Home</a>
            </div>
        </form>
    </div>

    <script>
        const roleSelect = document.getElementById('roleSelect');
        const body = document.body;
        const btn = document.getElementById('resetBtn');
        const title = document.getElementById('pageTitle');

        // Dynamic Styling
        roleSelect.addEventListener('change', function() {
            if (this.value === 'student') {
                body.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
                btn.style.background = "linear-gradient(to right, #667eea, #764ba2)";
                title.style.color = "#667eea";
            } else if (this.value === 'warden') {
                body.style.background = "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)";
                btn.style.background = "linear-gradient(to right, #11998e, #38ef7d)";
                title.style.color = "#11998e";
            } else if (this.value === 'teacher') {
                body.style.background = "linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)";
                btn.style.background = "linear-gradient(to right, #ff9966, #ff5e62)";
                title.style.color = "#ff9966";
            }
        });

        // SUPABASE CONNECTION
        const supabaseUrl = 'https://rekuelfrjkgeabhbsvqy.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJla3VlbGZyamtnZWFiaGJzdnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzY3MzEsImV4cCI6MjA5MDAxMjczMX0.3yxUU9Qls7enZdSceXmLkst0CiMkkt2UuUTH7n63E0o'; 
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            btn.innerText = "Updating...";
            btn.disabled = true;

            const role = roleSelect.value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const newpass = document.getElementById('newpass').value;

            let tableName = '';
            if (role === 'student') tableName = 'students';
            else if (role === 'warden') tableName = 'wardens';
            else if (role === 'teacher') tableName = 'teachers';

           
            const { data: user, error: fetchError } = await supabaseClient
                .from(tableName)
                .select('id')
                .eq('email', email)
                .eq('phone', phone)
                .single();

            if (user) {
                
                const { error: updateError } = await supabaseClient
                    .from(tableName)
                    .update({ password: newpass })
                    .eq('id', user.id);

                if (updateError) {
                    alert('System error. Could not update password.');
                } else {
                    alert('Password Reset Successful! You can now login.');
                    window.location.href = `login.html?role=${role}`;
                }
            } else {
                alert(`Error: The email and phone number do not match any ${role} account.`);
            }

            btn.innerText = "Update Password";
            btn.disabled = false;
        });
    </script>
</body>
</html>
