<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warden Registration</title>
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); display: flex; justify-content: center; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .container { background: white; padding: 40px; border-radius: 10px; width: 100%; max-width: 450px; }
        input[type="text"], input[type="tel"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        input:focus:invalid { border-color: red; outline: none; box-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        input:focus:valid { border-color: green; outline: none; box-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }
        .radio-group { margin: 15px 0; font-weight: bold; color: #555; }
        .radio-group input { margin-left: 10px; margin-right: 5px; }
        button { width: 100%; padding: 12px; background: #11998e; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 10px; font-size: 1rem; }
    </style>
    <!-- Load Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">Warden Register</h2>
        <form id="wardenForm">
            <input type="text" id="fullname" placeholder="Full Name" required pattern="^[A-Za-z]+( [A-Za-z]+)*$" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
            <input type="tel" id="phone" placeholder="Phone Number" required pattern="[0-9]{10}" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <input type="email" id="email" placeholder="Email (e.g. name@bvrit.ac.in)" required pattern="^[a-zA-Z0-9._]+@bvrit\.ac\.in$" oninput="checkEmail()">
            
            <div class="radio-group">
                <label>I manage: </label>
                <input type="radio" name="gender" value="Male" required> Boys Hostel
                <input type="radio" name="gender" value="Female" required> Girls Hostel
            </div>

            <input type="password" id="password" placeholder="Password (Min 8 chars, 1 Upper, 1 Num, 1 Symbol)" required pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}" oninput="checkPasswordMatch()">
            <input type="password" id="confirm_password" placeholder="Confirm Password" required oninput="checkPasswordMatch()">

            <button type="submit" id="submitBtn">Register</button>
            <p style="text-align:center"><a href="login.html?role=warden">Back to Login</a></p>
        </form>
    </div>

    <script>
        function checkEmail() {
            const emailInput = document.getElementById('email');
            const pattern = /^[a-zA-Z0-9._]+@bvrit\.ac\.in$/;
            emailInput.setCustomValidity(!pattern.test(emailInput.value) && emailInput.value !== "" ? "Must be a valid BVRIT email" : "");
        }
        function checkPasswordMatch() {
            const pass = document.getElementById('password'), confirmPass = document.getElementById('confirm_password');
            confirmPass.setCustomValidity(pass.value !== confirmPass.value && confirmPass.value !== "" ? "Passwords do not match." : "");
        }

        // SUPABASE CONNECTION
        const supabaseUrl = 'https://rekuelfrjkgeabhbsvqy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJla3VlbGZyamtnZWFiaGJzdnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzY3MzEsImV4cCI6MjA5MDAxMjczMX0.3yxUU9Qls7enZdSceXmLkst0CiMkkt2UuUTH7n63E0o';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('wardenForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Registering...";
            btn.disabled = true;

            const wardenData = {
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                password: document.getElementById('password').value
            };

            const { data, error } = await supabaseClient
                .from('wardens')
                .insert([wardenData]);

            if (error) {
                if(error.code === '23505') {
                    alert("Account already exists with this email!");
                } else {
                    alert("Error: " + error.message);
                }
                btn.innerText = "Register";
                btn.disabled = false;
            } else {
                alert('Warden Account Created!');
                window.location.href = 'login.html?role=warden';
            }
        });
    </script>
</body>
</html>
