<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warden Registration</title>
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); display: flex; justify-content: center; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .container { background: white; padding: 40px; border-radius: 10px; width: 100%; max-width: 450px; }
        input[type="text"], input[type="tel"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Real-time visual feedback: Red for invalid, Green for valid */
        input:focus:invalid { border-color: red; outline: none; box-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        input:focus:valid { border-color: green; outline: none; box-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }

        .radio-group { margin: 15px 0; font-weight: bold; color: #555; }
        .radio-group input { margin-left: 10px; margin-right: 5px; }
        button { width: 100%; padding: 12px; background: #11998e; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">Warden Register</h2>
        <form id="wardenForm" action="save_warden.php" method="POST">
            
            <input type="text" id="fullname" name="fullname" placeholder="Full Name" required 
                   pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" 
                   oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
            
            <input type="tel" id="phone" name="phone" placeholder="Phone Number" required 
                   pattern="[0-9]{10}" maxlength="10" title="Please enter exactly 10 digits" 
                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            
            <input type="email" id="email" name="email" placeholder="Email (e.g. name@bvrit.ac.in)" required 
                   pattern="^[a-zA-Z0-9._]+@bvrit\.ac\.in$" 
                   title="Must be a valid BVRIT email ending in @bvrit.ac.in"
                   oninput="checkEmail()">
            
            <div class="radio-group">
                <label>I manage: </label>
                <input type="radio" name="gender" value="Male" required> Boys Hostel
                <input type="radio" name="gender" value="Female" required> Girls Hostel
            </div>

            <input type="password" id="password" name="password" placeholder="Password (Min 8 chars, 1 Upper, 1 Num, 1 Symbol)" required 
                   pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}" 
                   title="Must be at least 8 characters, with 1 uppercase, 1 number, and 1 symbol"
                   oninput="checkPasswordMatch()">
            
            <input type="password" id="confirm_password" placeholder="Confirm Password" required 
                   oninput="checkPasswordMatch()">

            <button type="submit">Register</button>
            <p style="text-align:center"><a href="login.html?role=warden">Back to Login</a></p>
        </form>
    </div>

    <script>
        // Real-time check to ensure email ends with @bvrit.ac.in
        function checkEmail() {
            var emailInput = document.getElementById('email');
            var emailPattern = /^[a-zA-Z0-9._]+@bvrit\.ac\.in$/;
            
            if (!emailPattern.test(emailInput.value) && emailInput.value !== "") {
                emailInput.setCustomValidity("Must be a valid BVRIT email ending in @bvrit.ac.in");
            } else {
                emailInput.setCustomValidity("");
            }
        }

        // Real-time check to ensure passwords match exactly
        function checkPasswordMatch() {
            var pass = document.getElementById('password');
            var confirmPass = document.getElementById('confirm_password');
            
            if (pass.value !== confirmPass.value && confirmPass.value !== "") {
                confirmPass.setCustomValidity("Passwords do not match.");
            } else {
                confirmPass.setCustomValidity("");
            }
        }
    </script>
</body>
</html>
